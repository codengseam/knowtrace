name: Deploy to ModelScope Studio

# 合并到 master 后自动同步本仓库到魔搭 ModelScope Studio。
# 当前阶段：纯 git 同步（不跑静态站点构建），因为 knowtrace 还在 MVP 骨架阶段，
# src/utils/sorting.py 和 src/web/static-site/ 尚未从 HaloRead 迁移过来，
# build_site.py 暂时跑不通。等 MVP 前端就绪后再恢复构建步骤。

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: modelscope-deploy
  cancel-in-progress: true

jobs:
  sync-to-modelscope:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Diagnose secrets
        env:
          MS_TOKEN: ${{ secrets.MODELSCOPE_API_TOKEN }}
        run: |
          if [ -z "$MS_TOKEN" ]; then
            echo "::error::MODELSCOPE_API_TOKEN 未配置。请前往 GitHub Settings → Secrets and variables → Actions → New repository secret 添加：Name=MODELSCOPE_API_TOKEN, Value=魔搭个人中心的访问令牌。"
            exit 1
          fi
          echo "✅ MODELSCOPE_API_TOKEN 已配置"

      - name: Push to ModelScope Studio (knowtrace)
        env:
          MS_TOKEN: ${{ secrets.MODELSCOPE_API_TOKEN }}
        run: |
          set -e

          # 魔搭目标仓库（硬编码，避免 Variable 未配置导致部署失败）
          MS_REPO="https://www.modelscope.cn/studios/codengseam/knowtrace.git"
          AUTH_REPO=$(echo "$MS_REPO" | sed "s|https://|https://oauth2:${MS_TOKEN}@|")

          # 在临时目录操作远端仓库，避免污染 GitHub Actions 工作区
          WORK_DIR=$(mktemp -d)
          cd "$WORK_DIR"

          git init -b master
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add modelscope "$AUTH_REPO"

          # 拉取远端 master（若存在）；首次部署到空仓库时跳过
          if git fetch modelscope master 2>&1; then
            echo "✅ 已拉取远端 master 分支，基于远端历史增量同步"
            git checkout -b deploy modelscope/master
          else
            echo "ℹ️ 远端 master 不存在（首次部署到空仓库），将创建新分支"
            git checkout -b deploy
          fi

          # 用当前仓库的完整内容覆盖临时目录（保留远端独有文件如 README.md 卡片，覆盖同名文件）
          # 排除 .git 自身
          rsync -a --delete \
            --exclude='.git' \
            "$GITHUB_WORKSPACE"/. .

          # 提交变更（允许空提交，方便手动触发重跑部署）
          git add -A
          git commit -m "deploy: sync from GitHub ${{ github.sha }}" --allow-empty || echo "无变更需要提交"

          # 推送到魔搭 master 分支
          if git push "$AUTH_REPO" deploy:master 2>&1; then
            echo "✅ 已推送到魔搭 master 分支"
          else
            echo "::error::推送到魔搭仓库失败，请检查 Token 权限和仓库地址。"
            exit 1
          fi

          # 清理
          cd "$GITHUB_WORKSPACE"
          rm -rf "$WORK_DIR"

          echo "✅ Deployed to ModelScope Studio (knowtrace)"

      - name: Job Summary
        if: always()
        run: |
          echo "## 🚀 魔搭 Studio 部署结果（knowtrace）" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **目标仓库**: https://www.modelscope.cn/studios/codengseam/knowtrace.git" >> $GITHUB_STEP_SUMMARY
          echo "- **访问地址**: https://www.modelscope.cn/studios/codengseam/knowtrace" >> $GITHUB_STEP_SUMMARY
          echo "- **触发 commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **状态**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ 部署成功！魔搭 knowtrace 仓库内容已与 GitHub master 同步。" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📌 后续操作" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "1. 首次部署后，请前往魔搭仓库页面确认内容已同步。" >> $GITHUB_STEP_SUMMARY
            echo "2. 部署使用的 Token 已在 GitHub Secret 中保存，请勿在代码或对话中明文出现。" >> $GITHUB_STEP_SUMMARY
            echo "3. 等 knowtrace MVP 前端就绪后，恢复 workflow 中的 build_site.py 构建步骤。" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 部署失败，请查看上方日志排查。" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 常见失败原因" >> $GITHUB_STEP_SUMMARY
            echo "- \`MODELSCOPE_API_TOKEN\` 未配置或已过期 → 前往 GitHub Settings → Secrets → Actions 重新设置" >> $GITHUB_STEP_SUMMARY
            echo "- Token 权限不足 → 在魔搭个人中心确认 Token 有 \`studio\` 写权限" >> $GITHUB_STEP_SUMMARY
            echo "- 远端仓库地址变更 → 修改本 workflow 中 \`MS_REPO=\` 这一行" >> $GITHUB_STEP_SUMMARY
          fi
